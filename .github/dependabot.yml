version: 2
updates:
  # Dépendances Maven (Java)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    groups:
      openpdf:
        patterns:
          - "com.github.librepdf:*"
      gson:
        patterns:
          - "com.google.code.gson:*"
      testing:
        patterns:
          - "org.junit.*:*"
          - "junit:*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "ci"